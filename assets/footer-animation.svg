<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 80" width="100%" height="80">
  <defs>
    <!-- Glowing Gradient -->
    <linearGradient id="footerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f5d4" />
      <stop offset="50%" stop-color="#9b5de5" />
      <stop offset="100%" stop-color="#0072ff" />
    </linearGradient>

    <filter id="textGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <style>
    .footer-text {
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 16px;
      font-weight: 700;
      fill: #a0aec0;
      letter-spacing: 3px;
      text-anchor: middle;
      animation: pulseText 3s infinite ease-in-out;
    }
    
    .wave-line {
      fill: none;
      stroke: url(#footerGrad);
      stroke-width: 1.5;
      stroke-dasharray: 400;
      stroke-dashoffset: 0;
      animation: pulseLine 6s infinite linear;
    }

    @keyframes pulseText {
      0%, 100% { fill: #a0aec0; filter: none; }
      50% { fill: #ffffff; filter: drop-shadow(0 0 5px rgba(0, 245, 212, 0.7)); }
    }
    
    @keyframes pulseLine {
      0% { stroke-dashoffset: 800; }
      100% { stroke-dashoffset: 0; }
    }
  </style>

  <rect width="900" height="80" fill="none" />

  <!-- Animated Text -->
  <text x="450" y="45" class="footer-text">THANKS FOR VISITING MY PROFILE</text>

  <!-- Glowing Line below/above -->
  <path d="M 150,55 L 400,55 L 450,65 L 500,55 L 750,55" class="wave-line" filter="url(#textGlow)" />
  <path d="M 200,25 L 420,25 L 450,15 L 480,25 L 700,25" class="wave-line" opacity="0.5" />
</svg>
