<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 220" width="420" height="220">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#090d1f" />
      <stop offset="100%" stop-color="#04060f" />
    </linearGradient>

    <!-- Border Gradient -->
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f5d4" />
      <stop offset="100%" stop-color="#9b5de5" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <style>
    .card-base {
      fill: url(#bgGrad);
      stroke: url(#borderGrad);
      stroke-width: 1.5;
      rx: 12px;
    }
    .project-title {
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 20px;
      font-weight: 800;
      fill: #ffffff;
      letter-spacing: 0.5px;
    }
    .project-desc {
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 12px;
      fill: #a0aec0;
    }
    .badge-bg {
      fill: #1a202c;
      rx: 6px;
      stroke: #2d3748;
      stroke-width: 0.8;
    }
    .badge-text {
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 10px;
      font-weight: 600;
      fill: #00f5d4;
    }
  </style>

  <!-- Card Base -->
  <rect width="420" height="220" class="card-base" />

  <!-- Grid decoration inside card -->
  <path d="M 320 0 L 320 220 M 0 160 L 420 160" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="4 4" opacity="0.3" />

  <!-- Glowing Abstract Illustration (Datacenter = Racks/Cloud) -->
  <g transform="translate(330, 40)" opacity="0.8">
    <rect x="10" y="10" width="60" height="12" rx="2" fill="#1f2937" stroke="#00f5d4" stroke-width="1"/>
    <circle cx="20" cy="16" r="3" fill="#00f5d4" filter="url(#glow)"/>
    <line x1="35" y1="16" x2="60" y2="16" stroke="#4b5563" stroke-width="2"/>
    
    <rect x="10" y="27" width="60" height="12" rx="2" fill="#1f2937" stroke="#9b5de5" stroke-width="1"/>
    <circle cx="20" cy="33" r="3" fill="#9b5de5" />
    <line x1="35" y1="33" x2="60" y2="33" stroke="#4b5563" stroke-width="2"/>
    
    <rect x="10" y="44" width="60" height="12" rx="2" fill="#1f2937" stroke="#0072ff" stroke-width="1"/>
    <circle cx="20" cy="50" r="3" fill="#0072ff" />
    <line x1="35" y1="50" x2="60" y2="50" stroke="#4b5563" stroke-width="2"/>
  </g>

  <!-- Project Title & Status -->
  <text x="30" y="45" class="project-title">Datacenter Project</text>
  
  <g transform="translate(30, 60)">
    <!-- Status Indicator -->
    <circle cx="5" cy="0" r="4" fill="#00f5d4" />
    <text x="15" y="4" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" font-weight="700" fill="#718096" letter-spacing="1">INFRASTRUCTURE / VPS</text>
  </g>

  <!-- Project Description (Manual Wrapping) -->
  <text x="30" y="90" class="project-desc">
    <tspan x="30" dy="0">Création d'une infrastructure cloud complète</tspan>
    <tspan x="30" dy="18">avec serveurs VPS, hébergement web et</tspan>
    <tspan x="30" dy="18">orchestration automatisée de conteneurs.</tspan>
  </text>

  <!-- Tech Badges -->
  <g transform="translate(30, 175)">
    <!-- Badge 1 -->
    <g transform="translate(0, 0)">
      <rect width="80" height="24" class="badge-bg" />
      <text x="40" y="15" class="badge-text" text-anchor="middle">Kubernetes</text>
    </g>
    <!-- Badge 2 -->
    <g transform="translate(88, 0)">
      <rect width="60" height="24" class="badge-bg" />
      <text x="30" y="15" class="badge-text" text-anchor="middle" style="fill: #9b5de5;">Docker</text>
    </g>
    <!-- Badge 3 -->
    <g transform="translate(156, 0)">
      <rect width="60" height="24" class="badge-bg" />
      <text x="30" y="15" class="badge-text" text-anchor="middle" style="fill: #0072ff;">Ansible</text>
    </g>
  </g>
</svg>
