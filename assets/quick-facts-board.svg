<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 150" width="100%" height="150">
  <defs>
    <!-- Background Card Gradient -->
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0e1326" />
      <stop offset="100%" stop-color="#060914" />
    </linearGradient>

    <!-- Card Borders -->
    <linearGradient id="borderCyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f5d4" opacity="0.8" />
      <stop offset="100%" stop-color="#0072ff" opacity="0.2" />
    </linearGradient>

    <linearGradient id="borderBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0072ff" opacity="0.8" />
      <stop offset="100%" stop-color="#9b5de5" opacity="0.2" />
    </linearGradient>

    <linearGradient id="borderViolet" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9b5de5" opacity="0.8" />
      <stop offset="100%" stop-color="#00f5d4" opacity="0.2" />
    </linearGradient>

    <!-- Shadow and Glow Filters -->
    <filter id="cardGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <style>
    .fact-card {
      fill: url(#cardBg);
      stroke-width: 1.5;
      rx: 12px;
      transition: all 0.3s ease;
    }
    .fact-card:hover {
      filter: url(#cardGlow);
    }
    .fact-title {
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 14px;
      font-weight: 700;
      fill: #ffffff;
      letter-spacing: 0.5px;
    }
    .fact-subtitle {
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 11px;
      font-weight: 500;
      fill: #718096;
      letter-spacing: 1px;
    }
    .emoji-bg {
      font-size: 26px;
      dominant-baseline: middle;
      text-anchor: middle;
    }
    .pulse-dot {
      animation: pulseDot 2s infinite ease-in-out;
    }
    @keyframes pulseDot {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.9; }
    }
  </style>

  <!-- Background -->
  <rect width="900" height="150" fill="none" />

  <!-- Card 1: ENSPY -->
  <g transform="translate(15, 15)">
    <rect width="130" height="120" class="fact-card" stroke="url(#borderCyan)" />
    <text x="65" y="45" class="emoji-bg">🎓</text>
    <text x="65" y="85" class="fact-title" text-anchor="middle">ENSPY</text>
    <text x="65" y="102" class="fact-subtitle" text-anchor="middle">EDUCATION</text>
  </g>

  <!-- Card 2: Cameroon -->
  <g transform="translate(161, 15)">
    <rect width="130" height="120" class="fact-card" stroke="url(#borderBlue)" />
    <text x="65" y="45" class="emoji-bg">📍</text>
    <text x="65" y="85" class="fact-title" text-anchor="middle">Cameroon</text>
    <text x="65" y="102" class="fact-subtitle" text-anchor="middle">LOCATION</text>
  </g>

  <!-- Card 3: Full Stack -->
  <g transform="translate(307, 15)">
    <rect width="130" height="120" class="fact-card" stroke="url(#borderViolet)" />
    <text x="65" y="45" class="emoji-bg">💻</text>
    <text x="65" y="85" class="fact-title" text-anchor="middle">Full Stack</text>
    <text x="65" y="102" class="fact-subtitle" text-anchor="middle">SOFTWARE</text>
  </g>

  <!-- Card 4: AI -->
  <g transform="translate(453, 15)">
    <rect width="130" height="120" class="fact-card" stroke="url(#borderCyan)" />
    <text x="65" y="45" class="emoji-bg">🤖</text>
    <text x="65" y="85" class="fact-title" text-anchor="middle">AI &amp; ML</text>
    <text x="65" y="102" class="fact-subtitle" text-anchor="middle">INTELLIGENCE</text>
  </g>

  <!-- Card 5: Open Source -->
  <g transform="translate(599, 15)">
    <rect width="130" height="120" class="fact-card" stroke="url(#borderBlue)" />
    <text x="65" y="45" class="emoji-bg">🌍</text>
    <text x="65" y="85" class="fact-title" text-anchor="middle">Open Source</text>
    <text x="65" y="102" class="fact-subtitle" text-anchor="middle">COMMUNITY</text>
  </g>

  <!-- Card 6: Entrepreneur -->
  <g transform="translate(745, 15)">
    <rect width="130" height="120" class="fact-card" stroke="url(#borderViolet)" />
    <text x="65" y="45" class="emoji-bg">🚀</text>
    <text x="65" y="85" class="fact-title" text-anchor="middle">Entrepreneur</text>
    <text x="65" y="102" class="fact-subtitle" text-anchor="middle">INNOVATION</text>
  </g>

  <!-- Cyber Snake patrolling the quick facts board border -->
  <g>
    <!-- We hide the motion path itself (offset 10px from border) -->
    <path id="boardBorderPath" d="M 10,10 L 890,10 L 890,140 L 10,140 Z" fill="none" stroke="none" />
    
    <!-- Snake Head -->
    <circle r="3.5" fill="#00f5d4" filter="url(#cardGlow)">
      <animateMotion dur="14s" repeatCount="indefinite" rotate="auto">
        <mpath href="#boardBorderPath" />
      </animateMotion>
    </circle>
    
    <!-- Snake Body Segment 1 -->
    <circle r="2.5" fill="#0072ff" opacity="0.8">
      <animateMotion dur="14s" repeatCount="indefinite" begin="0.08s" rotate="auto">
        <mpath href="#boardBorderPath" />
      </animateMotion>
    </circle>
    
    <!-- Snake Body Segment 2 -->
    <circle r="1.8" fill="#9b5de5" opacity="0.5">
      <animateMotion dur="14s" repeatCount="indefinite" begin="0.16s" rotate="auto">
        <mpath href="#boardBorderPath" />
      </animateMotion>
    </circle>
  </g>
</svg>
