<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 220" width="420" height="220">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#090d1f" />
      <stop offset="100%" stop-color="#04060f" />
    </linearGradient>

    <!-- Border Gradient -->
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9b5de5" />
      <stop offset="100%" stop-color="#0072ff" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <style>
    .card-base {
      fill: url(#bgGrad);
      stroke: url(#borderGrad);
      stroke-width: 1.5;
      rx: 12px;
    }
    .project-title {
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 20px;
      font-weight: 800;
      fill: #ffffff;
      letter-spacing: 0.5px;
    }
    .project-desc {
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 12px;
      fill: #a0aec0;
    }
    .badge-bg {
      fill: #1a202c;
      rx: 6px;
      stroke: #2d3748;
      stroke-width: 0.8;
    }
    .badge-text {
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 10px;
      font-weight: 600;
      fill: #9b5de5;
    }
  </style>

  <!-- Card Base -->
  <rect width="420" height="220" class="card-base" />

  <!-- Grid decoration inside card -->
  <path d="M 320 0 L 320 220 M 0 160 L 420 160" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="4 4" opacity="0.3" />

  <!-- Glowing Abstract Illustration (FoodChain AI = Chain/Nodes) -->
  <g transform="translate(330, 30)" opacity="0.8">
    <path d="M 20 60 L 40 20 L 60 60 Z" fill="none" stroke="#9b5de5" stroke-width="1.5" />
    <circle cx="40" cy="20" r="6" fill="#00f5d4" filter="url(#glow)" />
    <circle cx="20" cy="60" r="6" fill="#9b5de5" />
    <circle cx="60" cy="60" r="6" fill="#0072ff" />
    <path d="M 40 20 L 40 45" stroke="#ffffff" stroke-width="1" stroke-dasharray="2 2" />
    <circle cx="40" cy="45" r="4" fill="#00f5d4" />
  </g>

  <!-- Project Title & Status -->
  <text x="30" y="45" class="project-title">FoodChain AI</text>
  
  <g transform="translate(30, 60)">
    <!-- Status Indicator -->
    <circle cx="5" cy="0" r="4" fill="#9b5de5" />
    <text x="15" y="4" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" font-weight="700" fill="#718096" letter-spacing="1">RESEARCH &amp; DEV</text>
  </g>

  <!-- Project Description (Manual Wrapping) -->
  <text x="30" y="90" class="project-desc">
    <tspan x="30" dy="0">Plateforme d'intelligence artificielle dédiée</tspan>
    <tspan x="30" dy="18">à l'alimentation. Analyse nutritionnelle et</tspan>
    <tspan x="30" dy="18">optimisation de la chaîne logistique agro.</tspan>
  </text>

  <!-- Tech Badges -->
  <g transform="translate(30, 175)">
    <!-- Badge 1 -->
    <g transform="translate(0, 0)">
      <rect width="65" height="24" class="badge-bg" />
      <text x="32.5" y="15" class="badge-text" text-anchor="middle">PyTorch</text>
    </g>
    <!-- Badge 2 -->
    <g transform="translate(73, 0)">
      <rect width="70" height="24" class="badge-bg" />
      <text x="35" y="15" class="badge-text" text-anchor="middle" style="fill: #00f5d4;">Next.js</text>
    </g>
    <!-- Badge 3 -->
    <g transform="translate(151, 0)">
      <rect width="80" height="24" class="badge-bg" />
      <text x="40" y="15" class="badge-text" text-anchor="middle" style="fill: #0072ff;">Supabase</text>
    </g>
  </g>
</svg>
