<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 250" width="100%" height="250" style="background: #05050f; font-family: 'Segoe UI', system-ui, sans-serif;">
  <!-- Definitions of gradients, filters and animations -->
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020208" />
      <stop offset="50%" stop-color="#07071c" />
      <stop offset="100%" stop-color="#0b112c" />
    </linearGradient>

    <!-- Theme Gradients -->
    <linearGradient id="neonCyanBlue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f5d4" />
      <stop offset="100%" stop-color="#0072ff" />
    </linearGradient>
    
    <linearGradient id="neonBlueViolet" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0072ff" />
      <stop offset="100%" stop-color="#9b5de5" />
    </linearGradient>

    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00e5ff" />
      <stop offset="50%" stop-color="#9b5de5" />
      <stop offset="100%" stop-color="#00f5d4" />
    </linearGradient>

    <!-- Glow Filters -->
    <filter id="glowCyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glowViolet" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <style>
    /* CSS Styles and Animations */
    .grid-line {
      stroke: #1a1e3a;
      stroke-width: 0.8;
      opacity: 0.4;
    }
    .pulse-node {
      animation: pulse 4s infinite ease-in-out;
    }
    .pulse-node-delayed {
      animation: pulse 4s infinite ease-in-out;
      animation-delay: 2s;
    }
    .flow-line {
      stroke-dasharray: 8 20;
      animation: flow 15s infinite linear;
    }
    .flow-line-reverse {
      stroke-dasharray: 10 30;
      animation: flow-rev 20s infinite linear;
    }
    .banner-title {
      font-size: 38px;
      font-weight: 800;
      fill: url(#textGrad);
      letter-spacing: 4px;
      animation: titleGlow 6s infinite ease-in-out;
    }
    .banner-subtitle {
      font-size: 16px;
      font-weight: 400;
      fill: #a0aec0;
      letter-spacing: 6px;
    }
    
    @keyframes pulse {
      0%, 100% { r: 3px; opacity: 0.4; filter: drop-shadow(0 0 2px rgba(0, 245, 212, 0.4)); }
      50% { r: 7px; opacity: 0.9; filter: drop-shadow(0 0 8px rgba(0, 245, 212, 0.9)); }
    }
    @keyframes flow {
      to { stroke-dashoffset: -200; }
    }
    @keyframes flow-rev {
      to { stroke-dashoffset: 300; }
    }
    @keyframes titleGlow {
      0%, 100% { filter: drop-shadow(0 0 2px rgba(0, 229, 255, 0.2)); }
      50% { filter: drop-shadow(0 0 10px rgba(155, 93, 229, 0.6)); }
    }
  </style>

  <!-- Background Rect -->
  <rect width="900" height="250" fill="url(#bgGrad)" />

  <!-- Grid Lines (Futuristic Cyber Grid) -->
  <g>
    <!-- Horizontal Grid -->
    <line x1="0" y1="40" x2="900" y2="40" class="grid-line" />
    <line x1="0" y1="80" x2="900" y2="80" class="grid-line" />
    <line x1="0" y1="120" x2="900" y2="120" class="grid-line" />
    <line x1="0" y1="160" x2="900" y2="160" class="grid-line" />
    <line x1="0" y1="200" x2="900" y2="200" class="grid-line" />

    <!-- Vertical Grid -->
    <line x1="100" y1="0" x2="100" y2="250" class="grid-line" />
    <line x1="200" y1="0" x2="200" y2="250" class="grid-line" />
    <line x1="300" y1="0" x2="300" y2="250" class="grid-line" />
    <line x1="400" y1="0" x2="400" y2="250" class="grid-line" />
    <line x1="500" y1="0" x2="500" y2="250" class="grid-line" />
    <line x1="600" y1="0" x2="600" y2="250" class="grid-line" />
    <line x1="700" y1="0" x2="700" y2="250" class="grid-line" />
    <line x1="800" y1="0" x2="800" y2="250" class="grid-line" />
  </g>

  <!-- Abstract Tech Circuits (Glowing Pathways) -->
  <g opacity="0.65">
    <path d="M -50,120 L 150,120 L 220,180 L 350,180 L 400,130 L 600,130 L 650,80 L 780,80 L 830,130 L 950,130" 
          fill="none" stroke="url(#neonCyanBlue)" stroke-width="2" class="flow-line" filter="url(#glowCyan)" />
    
    <path d="M 950,60 L 750,60 L 700,110 L 550,110 L 500,60 L 300,60 L 250,110 L 120,110 L 70,160 L -50,160" 
          fill="none" stroke="url(#neonBlueViolet)" stroke-width="1.5" class="flow-line-reverse" filter="url(#glowViolet)" />
  </g>

  <!-- Glowing Nodes (Intersections) -->
  <g>
    <!-- Cyan Nodes -->
    <circle cx="150" cy="120" r="4" fill="#00f5d4" class="pulse-node" />
    <circle cx="220" cy="180" r="5" fill="#00f5d4" class="pulse-node-delayed" />
    <circle cx="350" cy="180" r="4" fill="#00f5d4" class="pulse-node" />
    <circle cx="600" cy="130" r="5" fill="#00f5d4" class="pulse-node-delayed" />
    <circle cx="780" cy="80" r="4" fill="#00f5d4" class="pulse-node" />

    <!-- Violet Nodes -->
    <circle cx="700" cy="110" r="4" fill="#9b5de5" class="pulse-node-delayed" />
    <circle cx="550" cy="110" r="5" fill="#9b5de5" class="pulse-node" />
    <circle cx="300" cy="60" r="4" fill="#9b5de5" class="pulse-node-delayed" />
    <circle cx="120" cy="110" r="5" fill="#9b5de5" class="pulse-node" />
    <circle cx="70" cy="160" r="4" fill="#9b5de5" class="pulse-node-delayed" />
  </g>

  <!-- Glowing Cyber-Snakes slithering along the circuit paths -->
  <g>
    <!-- Cyan Cyber-Snake slithering left-to-right -->
    <g>
      <circle r="4.5" fill="#00f5d4" filter="url(#glowCyan)">
        <animateMotion dur="10s" repeatCount="indefinite" path="M -50,120 L 150,120 L 220,180 L 350,180 L 400,130 L 600,130 L 650,80 L 780,80 L 830,130 L 950,130" />
      </circle>
      <circle r="3.5" fill="#00d2ff" opacity="0.8">
        <animateMotion dur="10s" repeatCount="indefinite" begin="0.08s" path="M -50,120 L 150,120 L 220,180 L 350,180 L 400,130 L 600,130 L 650,80 L 780,80 L 830,130 L 950,130" />
      </circle>
      <circle r="2.8" fill="#0072ff" opacity="0.6">
        <animateMotion dur="10s" repeatCount="indefinite" begin="0.16s" path="M -50,120 L 150,120 L 220,180 L 350,180 L 400,130 L 600,130 L 650,80 L 780,80 L 830,130 L 950,130" />
      </circle>
      <circle r="2.0" fill="#9b5de5" opacity="0.4">
        <animateMotion dur="10s" repeatCount="indefinite" begin="0.24s" path="M -50,120 L 150,120 L 220,180 L 350,180 L 400,130 L 600,130 L 650,80 L 780,80 L 830,130 L 950,130" />
      </circle>
    </g>

    <!-- Violet Cyber-Snake slithering right-to-left -->
    <g>
      <circle r="4.5" fill="#9b5de5" filter="url(#glowViolet)">
        <animateMotion dur="12s" repeatCount="indefinite" path="M 950,60 L 750,60 L 700,110 L 550,110 L 500,60 L 300,60 L 250,110 L 120,110 L 70,160 L -50,160" />
      </circle>
      <circle r="3.5" fill="#0072ff" opacity="0.8">
        <animateMotion dur="12s" repeatCount="indefinite" begin="0.08s" path="M 950,60 L 750,60 L 700,110 L 550,110 L 500,60 L 300,60 L 250,110 L 120,110 L 70,160 L -50,160" />
      </circle>
      <circle r="2.8" fill="#00d2ff" opacity="0.6">
        <animateMotion dur="12s" repeatCount="indefinite" begin="0.16s" path="M 950,60 L 750,60 L 700,110 L 550,110 L 500,60 L 300,60 L 250,110 L 120,110 L 70,160 L -50,160" />
      </circle>
      <circle r="2.0" fill="#00f5d4" opacity="0.4">
        <animateMotion dur="12s" repeatCount="indefinite" begin="0.24s" path="M 950,60 L 750,60 L 700,110 L 550,110 L 500,60 L 300,60 L 250,110 L 120,110 L 70,160 L -50,160" />
      </circle>
    </g>
  </g>

  <!-- Futuristic Corner Highlights -->
  <path d="M 10 30 L 10 10 L 30 10" fill="none" stroke="#00f5d4" stroke-width="2.5" />
  <path d="M 890 30 L 890 10 L 870 10" fill="none" stroke="#9b5de5" stroke-width="2.5" />
  <path d="M 10 220 L 10 240 L 30 240" fill="none" stroke="#9b5de5" stroke-width="2.5" />
  <path d="M 890 220 L 890 240 L 870 240" fill="none" stroke="#00f5d4" stroke-width="2.5" />

  <!-- Center Branding -->
  <g transform="translate(450, 115)" text-anchor="middle">
    <!-- Main Title -->
    <text y="0" class="banner-title">SAMUEL SEAN FOTSING</text>
    <!-- Subtitle -->
    <text y="40" class="banner-subtitle">AI ENGINEER • FULL STACK DEVELOPER</text>
  </g>

  <!-- Decorative HUD elements -->
  <text x="25" y="35" fill="#00f5d4" font-size="8" font-family="monospace" opacity="0.6">SYS.LOC: 4.096 // LAT.CMD: 12ms</text>
  <text x="875" y="35" fill="#9b5de5" font-size="8" font-family="monospace" opacity="0.6" text-anchor="end">STATUS: ACTIVE // SRC: PRT_ENG</text>
  
  <rect x="25" y="42" width="100" height="2" fill="url(#neonCyanBlue)" opacity="0.4" />
  <rect x="775" y="42" width="100" height="2" fill="url(#neonCyanBlue)" opacity="0.4" />
</svg>
