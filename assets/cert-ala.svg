<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 130" width="420" height="130">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0f24" />
      <stop offset="100%" stop-color="#040714" />
    </linearGradient>

    <!-- Border Gradient -->
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9b5de5" />
      <stop offset="100%" stop-color="#0072ff" />
    </linearGradient>

    <!-- Seal Glow -->
    <filter id="sealGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <style>
    .cert-base {
      fill: url(#bgGrad);
      stroke: url(#borderGrad);
      stroke-width: 1.5;
      rx: 10px;
    }
    .cert-title {
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 15px;
      font-weight: 800;
      fill: #ffffff;
    }
    .cert-platform {
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 11px;
      font-weight: 600;
      fill: #9b5de5;
      letter-spacing: 0.5px;
    }
    .cert-date {
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 10px;
      fill: #718096;
    }
    .seal-text {
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 8px;
      font-weight: 800;
      fill: #ffffff;
      letter-spacing: 1px;
    }
  </style>

  <!-- Card Base -->
  <rect width="420" height="130" class="cert-base" />

  <!-- Grid detail -->
  <line x1="330" y1="0" x2="330" y2="130" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="4 4" opacity="0.3" />

  <!-- Info -->
  <g transform="translate(25, 25)">
    <text x="0" y="15" class="cert-platform">COURSERA / DEEPLEARNING.AI</text>
    <text x="0" y="38" class="cert-title">Advanced Learning Algorithms</text>
    <text x="0" y="62" class="cert-date">Issued: 2024 • ID: COURSERA-ALA-SF</text>
  </g>

  <!-- Verified Seal Graphic -->
  <g transform="translate(345, 35)">
    <!-- Outer gold/violet glowing ring -->
    <circle cx="25" cy="25" r="22" fill="none" stroke="#9b5de5" stroke-width="1.5" filter="url(#sealGlow)" />
    <circle cx="25" cy="25" r="18" fill="#111827" stroke="#0072ff" stroke-width="1" />
    <!-- Checkmark inside seal -->
    <path d="M 18 25 L 23 30 L 32 18" fill="none" stroke="#9b5de5" stroke-width="2.5" />
    <text x="25" y="44" class="seal-text" text-anchor="middle">VERIFIED</text>
  </g>
</svg>
