<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 350" width="100%" height="350">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#040614" />
      <stop offset="100%" stop-color="#0c0e22" />
    </linearGradient>

    <!-- Node Gradient -->
    <linearGradient id="nodeActiveGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f5d4" />
      <stop offset="100%" stop-color="#0072ff" />
    </linearGradient>

    <linearGradient id="nodeProgressGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9b5de5" />
      <stop offset="100%" stop-color="#0072ff" />
    </linearGradient>

    <linearGradient id="nodePlannedGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2d3748" />
      <stop offset="100%" stop-color="#1a202c" />
    </linearGradient>

    <!-- Glowing Filters -->
    <filter id="glowActive" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glowProgress" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <style>
    .roadmap-line {
      stroke: #1e293b;
      stroke-width: 4;
      fill: none;
    }
    .roadmap-line-active {
      stroke: #0072ff;
      stroke-width: 4;
      fill: none;
      stroke-dasharray: 800;
      stroke-dashoffset: 0;
      animation: drawLine 3s ease-out forwards;
    }
    .node-text-title {
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 13px;
      font-weight: 700;
      fill: #ffffff;
    }
    .node-text-subtitle {
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 10px;
      font-weight: 500;
      fill: #718096;
      letter-spacing: 0.5px;
    }
    .node-active {
      fill: url(#nodeActiveGrad);
      stroke: #040614;
      stroke-width: 3;
      filter: url(#glowActive);
    }
    .node-progress {
      fill: url(#nodeProgressGrad);
      stroke: #040614;
      stroke-width: 3;
      filter: url(#glowProgress);
      animation: pulseProgress 2.5s infinite ease-in-out;
    }
    .node-planned {
      fill: url(#nodePlannedGrad);
      stroke: #334155;
      stroke-width: 2;
    }
    
    @keyframes pulseProgress {
      0%, 100% { transform: scale(1); filter: drop-shadow(0 0 2px rgba(155, 93, 229, 0.4)); }
      50% { transform: scale(1.15); filter: drop-shadow(0 0 10px rgba(155, 93, 229, 0.8)); }
    }
  </style>

  <!-- Background -->
  <rect width="900" height="350" rx="15" fill="url(#bgGrad)" stroke="#1e293b" stroke-width="1.5" />

  <!-- Grid Pattern (Tech Matrix) -->
  <g opacity="0.1">
    <path d="M 0,50 L 900,50 M 0,100 L 900,100 M 0,150 L 900,150 M 0,200 L 900,200 M 0,250 L 900,250 M 0,300 L 900,300" stroke="#00f5d4" stroke-width="0.5" />
    <path d="M 100,0 L 100,350 M 200,0 L 200,350 M 300,0 L 300,350 M 400,0 L 400,350 M 500,0 L 500,350 M 600,0 L 600,350 M 700,0 L 700,350 M 800,0 L 800,350" stroke="#00f5d4" stroke-width="0.5" />
  </g>

  <!-- Title -->
  <text x="40" y="45" font-family="'Segoe UI', system-ui, sans-serif" font-size="20" font-weight="800" fill="url(#nodeActiveGrad)" letter-spacing="2">GOALS &amp; ROADMAP</text>
  <text x="40" y="65" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" fill="#718096" letter-spacing="1">SKILLS &amp; TECHNOLOGICAL EVOLUTION</text>

  <!-- Connection Lines -->
  <!-- Base lines -->
  <path d="M 120,180 L 280,180" class="roadmap-line-active" />
  <path d="M 280,180 L 440,180" class="roadmap-line-active" />
  
  <!-- Branching Lines (AI Path) -->
  <path d="M 440,180 L 500,120 L 600,120" class="roadmap-line" stroke="#9b5de5" stroke-dasharray="5 5" opacity="0.8" />
  <path d="M 600,120 L 760,120" class="roadmap-line" opacity="0.3" />
  
  <!-- Branching Lines (Cloud/System Path) -->
  <path d="M 440,180 L 500,240 L 600,240" class="roadmap-line" stroke="#00f5d4" stroke-dasharray="5 5" opacity="0.8" />
  <path d="M 600,240 L 760,240" class="roadmap-line" opacity="0.3" />

  <!-- Node 1: Master AI (Completed) -->
  <g transform="translate(120, 180)">
    <circle cx="0" cy="0" r="14" class="node-active" />
    <!-- Checkmark -->
    <path d="M -5,0 L -1,4 L 6,-4" fill="none" stroke="#ffffff" stroke-width="2.5" />
    <text x="0" y="32" class="node-text-title" text-anchor="middle">Master AI</text>
    <text x="0" y="45" class="node-text-subtitle" text-anchor="middle">COMPLETED</text>
  </g>

  <!-- Node 2: Distributed Systems (Completed) -->
  <g transform="translate(280, 180)">
    <circle cx="0" cy="0" r="14" class="node-active" />
    <path d="M -5,0 L -1,4 L 6,-4" fill="none" stroke="#ffffff" stroke-width="2.5" />
    <text x="0" y="32" class="node-text-title" text-anchor="middle">Distributed Systems</text>
    <text x="0" y="45" class="node-text-subtitle" text-anchor="middle">COMPLETED</text>
  </g>

  <!-- Node 3: Cloud & Kubernetes (Completed) -->
  <g transform="translate(440, 180)">
    <circle cx="0" cy="0" r="14" class="node-active" />
    <path d="M -5,0 L -1,4 L 6,-4" fill="none" stroke="#ffffff" stroke-width="2.5" />
    <text x="0" y="-22" class="node-text-title" text-anchor="middle">Cloud &amp; Kubernetes</text>
    <text x="0" y="-10" class="node-text-subtitle" text-anchor="middle">COMPLETED</text>
  </g>

  <!-- Branch Node 4: LLM Engineering (In Progress) -->
  <g transform="translate(600, 120)">
    <circle cx="0" cy="0" r="12" class="node-progress" />
    <text x="0" y="-22" class="node-text-title" text-anchor="middle">LLM Engineering</text>
    <text x="0" y="-10" class="node-text-subtitle" text-anchor="middle">IN PROGRESS</text>
  </g>

  <!-- Branch Node 5: MLOps / Data Engineering (Planned) -->
  <g transform="translate(760, 120)">
    <circle cx="0" cy="0" r="10" class="node-planned" />
    <text x="0" y="25" class="node-text-title" text-anchor="middle">MLOps &amp; Data Eng.</text>
    <text x="0" y="38" class="node-text-subtitle" text-anchor="middle">PLANNED</text>
  </g>

  <!-- Branch Node 6: System Design (In Progress) -->
  <g transform="translate(600, 240)">
    <circle cx="0" cy="0" r="12" class="node-progress" />
    <text x="0" y="30" class="node-text-title" text-anchor="middle">System Design</text>
    <text x="0" y="42" class="node-text-subtitle" text-anchor="middle">IN PROGRESS</text>
  </g>

  <!-- Branch Node 7: DevOps / Site Reliability (Planned) -->
  <g transform="translate(760, 240)">
    <circle cx="0" cy="0" r="10" class="node-planned" />
    <text x="0" y="-22" class="node-text-title" text-anchor="middle">DevOps / SRE</text>
    <text x="0" y="-10" class="node-text-subtitle" text-anchor="middle">PLANNED</text>
  </g>
</svg>
