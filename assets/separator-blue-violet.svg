<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 40" width="100%" height="40">
  <defs>
    <linearGradient id="gradBlueViolet" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0072ff" stop-opacity="0.8" />
      <stop offset="50%" stop-color="#9b5de5" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#00f5d4" stop-opacity="0" />
    </linearGradient>
    <filter id="separatorGlow" x="-10%" y="-30%" width="120%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="900" height="40" fill="none" />
  
  <!-- Main Glowing Separator Line -->
  <path d="M 0 20 L 300 20 L 320 10 L 580 10 L 600 20 L 900 20" 
        fill="none" stroke="url(#gradBlueViolet)" stroke-width="2.5" filter="url(#separatorGlow)" />
        
  <!-- Parallel Thin Line -->
  <path d="M 50 25 L 290 25 L 310 15 L 590 15 L 610 25 L 850 25" 
        fill="none" stroke="url(#gradBlueViolet)" stroke-width="0.8" opacity="0.5" />
        
  <!-- Accent Tech Dots -->
  <circle cx="310" cy="15" r="2" fill="#0072ff" />
  <circle cx="590" cy="15" r="2" fill="#9b5de5" />
  
  <rect x="420" y="8" width="60" height="4" rx="2" fill="url(#gradBlueViolet)" opacity="0.3" />
</svg>
