<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 250" width="220" height="220">
  <defs>
    <!-- Glowing gradients -->
    <linearGradient id="orbitGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f5d4" />
      <stop offset="50%" stop-color="#0072ff" />
      <stop offset="100%" stop-color="#9b5de5" />
    </linearGradient>
    
    <linearGradient id="avatarGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0e1726" />
      <stop offset="100%" stop-color="#030712" />
    </linearGradient>

    <linearGradient id="visorGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f5d4" />
      <stop offset="100%" stop-color="#0072ff" />
    </linearGradient>

    <!-- Drop shadows and glows -->
    <filter id="ringGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <filter id="visorGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <style>
    .orbit-ring {
      fill: none;
      stroke: url(#orbitGrad);
      stroke-width: 3;
      stroke-dasharray: 450 150;
      transform-origin: center;
      animation: rotateRing 8s linear infinite;
    }
    .orbit-ring-inner {
      fill: none;
      stroke: #00f5d4;
      stroke-width: 1.5;
      stroke-dasharray: 20 80;
      transform-origin: center;
      animation: rotateRingRev 12s linear infinite;
      opacity: 0.8;
    }
    .node-pulse {
      animation: pulseNode 3s infinite ease-in-out;
    }
    .node-pulse-2 {
      animation: pulseNode 3s infinite ease-in-out;
      animation-delay: 1.5s;
    }
    
    @keyframes rotateRing {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes rotateRingRev {
      from { transform: rotate(360deg); }
      to { transform: rotate(0deg); }
    }
    @keyframes pulseNode {
      0%, 100% { fill: #00f5d4; opacity: 0.5; r: 3px; }
      50% { fill: #9b5de5; opacity: 1; r: 5px; }
    }
  </style>

  <!-- Outer Ring (Glowing) -->
  <circle cx="125" cy="125" r="110" class="orbit-ring" filter="url(#ringGlow)" />
  <circle cx="125" cy="125" r="102" class="orbit-ring-inner" />

  <!-- Inner Clipped Avatar Base -->
  <g>
    <!-- Clip Path for perfect circle -->
    <clipPath id="avatarClip">
      <circle cx="125" cy="125" r="95" />
    </clipPath>
    
    <!-- Apply clip -->
    <g clip-path="url(#avatarClip)">
      <!-- Background of avatar -->
      <circle cx="125" cy="125" r="95" fill="url(#avatarGrad)" stroke="#1f2937" stroke-width="2" />
      
      <!-- Tech Grid overlay in background -->
      <g opacity="0.15">
        <path d="M 0,125 L 250,125 M 125,0 L 125,250" stroke="#00f5d4" stroke-width="1" />
        <circle cx="125" cy="125" r="40" fill="none" stroke="#00f5d4" stroke-dasharray="5 5" />
        <circle cx="125" cy="125" r="70" fill="none" stroke="#00f5d4" stroke-dasharray="10 10" />
      </g>

      <!-- AI Neural Nodes background -->
      <path d="M 70,80 L 125,50 L 180,80 M 125,50 L 125,120" stroke="#9b5de5" stroke-width="1" opacity="0.3" fill="none"/>
      
      <!-- Vector Silhouette of AI Engineer -->
      <!-- Shoulders/Torso -->
      <path d="M 50,220 C 50,180 80,165 125,165 C 170,165 200,180 200,220 Z" fill="#1e293b" />
      <path d="M 70,220 C 70,190 90,175 125,175 C 160,175 180,190 180,220 Z" fill="#0f172a" />
      
      <!-- Neck -->
      <rect x="113" y="145" width="24" height="25" fill="#334155" rx="2" />
      
      <!-- Head / Face Silhouette -->
      <path d="M 85,110 C 85,75 100,60 125,60 C 150,60 165,75 165,110 C 165,140 150,150 125,150 C 100,150 85,140 85,110 Z" fill="#1e293b" />
      <path d="M 90,110 C 90,78 102,65 125,65 C 148,65 160,78 160,110 C 160,138 148,145 125,145 C 102,145 90,138 90,110 Z" fill="#334155" />

      <!-- Glowing Cyber Visor Glasses -->
      <path d="M 95,92 C 95,92 105,86 125,86 C 145,86 155,92 155,92 C 158,96 156,104 153,106 C 145,112 105,112 97,106 C 94,104 92,96 95,92 Z" 
            fill="url(#visorGrad)" filter="url(#visorGlow)" />
      
      <line x1="97" y1="99" x2="153" y2="99" stroke="#ffffff" stroke-width="1" opacity="0.6" />

      <!-- Glowing Brain Network Nodes on Head -->
      <g>
        <line x1="125" y1="65" x2="125" y2="40" stroke="#00f5d4" stroke-width="1.5" opacity="0.7" />
        <line x1="100" y1="75" x2="75" y2="55" stroke="#00f5d4" stroke-width="1.5" opacity="0.7" />
        <line x1="150" y1="75" x2="175" y2="55" stroke="#00f5d4" stroke-width="1.5" opacity="0.7" />
        
        <circle cx="125" cy="40" r="4" class="node-pulse" />
        <circle cx="75" cy="55" r="4" class="node-pulse-2" />
        <circle cx="175" cy="55" r="4" class="node-pulse-2" />
      </g>
    </g>
  </g>

  <!-- Futuristic Hud Overlay Ring (Static / decorative) -->
  <circle cx="125" cy="125" r="95" fill="none" stroke="#374151" stroke-width="1" />

  <!-- Cyber Snake orbiting the avatar outer ring -->
  <g>
    <!-- We hide the motion path itself -->
    <path id="orbitPath" d="M 125,15 A 110,110 0 1,1 125,235 A 110,110 0 1,1 125,15" fill="none" stroke="none" />
    
    <!-- Snake Head -->
    <circle r="4" fill="#00f5d4" filter="url(#ringGlow)">
      <animateMotion dur="8s" repeatCount="indefinite" rotate="auto">
        <mpath href="#orbitPath" />
      </animateMotion>
    </circle>
    
    <!-- Snake Body Segment 1 -->
    <circle r="3.2" fill="#0072ff" opacity="0.8">
      <animateMotion dur="8s" repeatCount="indefinite" begin="0.08s" rotate="auto">
        <mpath href="#orbitPath" />
      </animateMotion>
    </circle>
    
    <!-- Snake Body Segment 2 -->
    <circle r="2.4" fill="#9b5de5" opacity="0.5">
      <animateMotion dur="8s" repeatCount="indefinite" begin="0.16s" rotate="auto">
        <mpath href="#orbitPath" />
      </animateMotion>
    </circle>
  </g>
</svg>
