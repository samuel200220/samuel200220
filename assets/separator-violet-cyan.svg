<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 40" width="100%" height="40">
  <defs>
    <linearGradient id="gradVioletCyan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9b5de5" stop-opacity="0.8" />
      <stop offset="50%" stop-color="#00f5d4" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#0072ff" stop-opacity="0" />
    </linearGradient>
    <filter id="separatorGlow" x="-10%" y="-30%" width="120%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="900" height="40" fill="none" />
  
  <!-- Main Glowing Separator Line -->
  <path d="M 0 20 L 400 20 L 415 30 L 485 30 L 500 20 L 900 20" 
        fill="none" stroke="url(#gradVioletCyan)" stroke-width="2.5" filter="url(#separatorGlow)" />
        
  <!-- Parallel Thin Line -->
  <path d="M 100 15 L 390 15 L 405 25 L 495 25 L 510 15 L 800 15" 
        fill="none" stroke="url(#gradVioletCyan)" stroke-width="0.8" opacity="0.5" />
        
  <!-- Accent Tech Dots -->
  <circle cx="405" cy="25" r="2" fill="#9b5de5" />
  <circle cx="495" cy="25" r="2" fill="#00f5d4" />
  
  <!-- Slithering Cyber-Snake along the separator line -->
  <g>
    <!-- We hide the motion path itself -->
    <path id="sepPath2" d="M 0 20 L 400 20 L 415 30 L 485 30 L 500 20 L 900 20" fill="none" stroke="none" />
    
    <!-- Snake Head -->
    <circle r="3.5" fill="#9b5de5" filter="url(#separatorGlow)">
      <animateMotion dur="9s" repeatCount="indefinite" rotate="auto">
        <mpath href="#sepPath2" />
      </animateMotion>
    </circle>
    
    <!-- Snake Body Segment 1 -->
    <circle r="2.5" fill="#0072ff" opacity="0.8">
      <animateMotion dur="9s" repeatCount="indefinite" begin="0.1s" rotate="auto">
        <mpath href="#sepPath2" />
      </animateMotion>
    </circle>
    
    <!-- Snake Body Segment 2 -->
    <circle r="1.8" fill="#00f5d4" opacity="0.5">
      <animateMotion dur="9s" repeatCount="indefinite" begin="0.2s" rotate="auto">
        <mpath href="#sepPath2" />
      </animateMotion>
    </circle>
  </g>
</svg>
