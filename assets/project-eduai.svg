<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 220" width="420" height="220">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#090d1f" />
      <stop offset="100%" stop-color="#04060f" />
    </linearGradient>

    <!-- Border Gradient -->
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f5d4" />
      <stop offset="100%" stop-color="#0072ff" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <style>
    .card-base {
      fill: url(#bgGrad);
      stroke: url(#borderGrad);
      stroke-width: 1.5;
      rx: 12px;
    }
    .project-title {
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 20px;
      font-weight: 800;
      fill: #ffffff;
      letter-spacing: 0.5px;
    }
    .project-desc {
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 12px;
      fill: #a0aec0;
    }
    .badge-bg {
      fill: #1a202c;
      rx: 6px;
      stroke: #2d3748;
      stroke-width: 0.8;
    }
    .badge-text {
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 10px;
      font-weight: 600;
      fill: #00f5d4;
    }
  </style>

  <!-- Card Base -->
  <rect width="420" height="220" class="card-base" />

  <!-- Grid decoration inside card -->
  <path d="M 320 0 L 320 220 M 0 160 L 420 160" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="4 4" opacity="0.3" />

  <!-- Glowing Abstract Illustration (EduAI = Education & AI) -->
  <g transform="translate(330, 40)" opacity="0.8">
    <!-- Graduation Cap stylized -->
    <path d="M 40 15 L 70 30 L 40 45 L 10 30 Z" fill="none" stroke="#00f5d4" stroke-width="1.5" />
    <path d="M 22 36 L 22 55 C 22 60 58 60 58 55 L 58 36" fill="none" stroke="#0072ff" stroke-width="1.5" />
    <!-- Tassel -->
    <path d="M 70 30 L 75 48 C 75 52 72 52 72 52" fill="none" stroke="#9b5de5" stroke-width="1" />
    <!-- Glow dot indicating AI integration -->
    <circle cx="40" cy="30" r="5" fill="#00f5d4" filter="url(#glow)" />
  </g>

  <!-- Project Title & Status -->
  <text x="30" y="45" class="project-title">EduAI</text>
  
  <g transform="translate(30, 60)">
    <!-- Status Indicator -->
    <circle cx="5" cy="0" r="4" fill="#00f5d4" />
    <text x="15" y="4" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" font-weight="700" fill="#718096" letter-spacing="1">BETA RELEASE</text>
  </g>

  <!-- Project Description (Manual Wrapping) -->
  <text x="30" y="90" class="project-desc">
    <tspan x="30" dy="0">Plateforme éducative intelligente intégrant</tspan>
    <tspan x="30" dy="18">des agents IA conversationnels, génération</tspan>
    <tspan x="30" dy="18">de quiz et assistance aux devoirs.</tspan>
  </text>

  <!-- Tech Badges -->
  <g transform="translate(30, 175)">
    <!-- Badge 1 -->
    <g transform="translate(0, 0)">
      <rect width="65" height="24" class="badge-bg" />
      <text x="32.5" y="15" class="badge-text" text-anchor="middle">LangChain</text>
    </g>
    <!-- Badge 2 -->
    <g transform="translate(73, 0)">
      <rect width="65" height="24" class="badge-bg" />
      <text x="32.5" y="15" class="badge-text" text-anchor="middle" style="fill: #00f5d4;">FastAPI</text>
    </g>
    <!-- Badge 3 -->
    <g transform="translate(146, 0)">
      <rect width="70" height="24" class="badge-bg" />
      <text x="35" y="15" class="badge-text" text-anchor="middle" style="fill: #0072ff;">ReactJS</text>
    </g>
  </g>
</svg>
